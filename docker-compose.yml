version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mental-health-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mental-health-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./src/frontend:/app/src/frontend
    environment:
      - API_URL=http://api:8000
    command: streamlit run src/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

